AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Veloquity MVP — Agentic Evidence Intelligence Infrastructure.
  Deploys S3, RDS PostgreSQL, Lambda (Ingestion + Governance),
  EventBridge cron, IAM roles, and Secrets Manager entry.

# ==============================================================
# PARAMETERS
# ==============================================================
Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  DBUsername:
    Type: String
    Default: veloquity_user
    Description: PostgreSQL master username

  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 12
    Description: PostgreSQL master password (min 12 chars)

  DBInstanceClass:
    Type: String
    Default: db.t3.medium
    Description: RDS instance type

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy RDS and Lambda into

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 subnets in different AZs for RDS subnet group

  BedrockEmbedModel:
    Type: String
    Default: amazon.titan-embed-text-v2:0
    Description: Bedrock embedding model ID

  BedrockLLMModel:
    Type: String
    Default: us.amazon.nova-pro-v1:0
    Description: Bedrock LLM model ID for Reasoning Agent

  SlackWebhookUrl:
    Type: String
    NoEcho: true
    Default: ""
    Description: Slack incoming webhook URL for digest output

  DeployBucket:
    Type: String
    Description: S3 bucket containing Lambda deployment zips (created by deploy.sh)

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Existing security group for Lambda and RDS (use default VPC SG for dev)

# ==============================================================
# RESOURCES
# ==============================================================
Resources:

  # ------------------------------------------------------------
  # S3 — Raw Feedback Storage (Section 3)
  # ------------------------------------------------------------
  RawFeedbackBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub veloquity-raw-${Env}-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveOldRawFeedback
            Status: Enabled
            Transitions:
              - TransitionInDays: 90
                StorageClass: GLACIER
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: Veloquity
        - Key: Env
          Value: !Ref Env

  # S3 bucket for HTML report output (Section 7)
  ReportBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub veloquity-reports-${Env}-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: Project
          Value: Veloquity
        - Key: Env
          Value: !Ref Env

  ReportBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReportBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${ReportBucket}/*

  # ------------------------------------------------------------
  # Secrets Manager — DB Credentials
  # ------------------------------------------------------------
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub veloquity/${Env}/db-credentials
      Description: Veloquity PostgreSQL credentials
      SecretString: !Sub |
        {
          "username": "${DBUsername}",
          "password": "${DBPassword}",
          "host": "",
          "port": "5432",
          "dbname": "veloquity"
        }
      Tags:
        - Key: Project
          Value: Veloquity

  # ------------------------------------------------------------
  # RDS — PostgreSQL with pgvector (Section 5)
  # ------------------------------------------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Veloquity RDS subnet group
      SubnetIds: !Ref SubnetIds
      Tags:
        - Key: Project
          Value: Veloquity

  VeloquityDB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub veloquity-${Env}
      DBName: veloquity
      DBInstanceClass: !Ref DBInstanceClass
      Engine: postgres
      EngineVersion: "16.6"
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: "20"
      MaxAllocatedStorage: 100
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: false          # single AZ for MVP cost savings
      PubliclyAccessible: true
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref SecurityGroupId
      BackupRetentionPeriod: 0
      DeletionProtection: false  # set to true in prod
      Tags:
        - Key: Project
          Value: Veloquity
        - Key: Env
          Value: !Ref Env

  # ------------------------------------------------------------
  # IAM — Lambda Execution Role (shared, least-privilege)
  # ------------------------------------------------------------
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub veloquity-lambda-role-${Env}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: VeloquityLambdaPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # S3 access
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RawFeedbackBucket.Arn
                  - !Sub ${RawFeedbackBucket.Arn}/*
                  - !GetAtt ReportBucket.Arn
                  - !Sub ${ReportBucket.Arn}/*
              # Bedrock access
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.titan-embed-text-v2:0
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-pro-v1:0
              # Secrets Manager
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DBSecret
              # CloudWatch Logs
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: arn:aws:logs:*:*:*

  # ------------------------------------------------------------
  # Lambda — Ingestion (Section 2)
  # One function handles both sources for MVP simplicity.
  # Source type is passed via event payload.
  # ------------------------------------------------------------
  IngestionLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub veloquity-ingestion-${Env}
      Runtime: python3.12
      Handler: ingestion.lambda_handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: lambda/ingestion.zip
      Timeout: 300
      MemorySize: 512
      VpcConfig:
        SecurityGroupIds:
          - !Ref SecurityGroupId
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          ENV: !Ref Env
          S3_RAW_BUCKET: !Ref RawFeedbackBucket
          DB_SECRET_ARN: !Ref DBSecret
          AWS_REGION_NAME: !Ref AWS::Region
          BEDROCK_EMBED_MODEL: !Ref BedrockEmbedModel
          CONFIDENCE_AUTO_REJECT: "0.4"
          CONFIDENCE_AUTO_ACCEPT: "0.6"
          MIN_CLUSTER_SIZE: "5"
          MIN_COSINE_SIMILARITY: "0.75"
      Tags:
        - Key: Project
          Value: Veloquity
        - Key: Env
          Value: !Ref Env

  # ------------------------------------------------------------
  # Lambda — Evidence Intelligence (Section 4)
  # Triggered after ingestion writes to S3.
  # ------------------------------------------------------------
  EvidenceLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub veloquity-evidence-${Env}
      Runtime: python3.12
      Handler: evidence.embedding_pipeline.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: lambda/evidence.zip
      Timeout: 600
      MemorySize: 1024
      # No VpcConfig — Lambda runs outside VPC so it can reach S3, Bedrock,
      # and Secrets Manager directly. RDS is PubliclyAccessible for MVP.
      Environment:
        Variables:
          ENV: !Ref Env
          S3_RAW_BUCKET: !Ref RawFeedbackBucket
          DB_SECRET_ARN: !Ref DBSecret
          AWS_REGION_NAME: !Ref AWS::Region
          BEDROCK_EMBED_MODEL: !Ref BedrockEmbedModel
          BEDROCK_LLM_MODEL: !Ref BedrockLLMModel
          EMBEDDING_CACHE_TTL_DAYS: "30"
          CONFIDENCE_AUTO_REJECT: "0.4"
          CONFIDENCE_AUTO_ACCEPT: "0.6"
          MIN_CLUSTER_SIZE: "5"
          MIN_COSINE_SIMILARITY: "0.75"
      Tags:
        - Key: Project
          Value: Veloquity
        - Key: Env
          Value: !Ref Env

  # S3 trigger: evidence pipeline fires when ingestion writes raw file
  S3TriggerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt EvidenceLambda.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt RawFeedbackBucket.Arn

  # ------------------------------------------------------------
  # Lambda — Reasoning Agent (Section 6)
  # Invoked on-demand (API call or manual trigger for MVP).
  # ------------------------------------------------------------
  ReasoningLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub veloquity-reasoning-${Env}
      Runtime: python3.12
      Handler: reasoning.agent.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: lambda/reasoning.zip
      Timeout: 300
      MemorySize: 512
      VpcConfig:
        SecurityGroupIds:
          - !Ref SecurityGroupId
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          ENV: !Ref Env
          DB_SECRET_ARN: !Ref DBSecret
          AWS_REGION_NAME: !Ref AWS::Region
          BEDROCK_LLM_MODEL: !Ref BedrockLLMModel
          REPORT_BUCKET: !Ref ReportBucket
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
      Tags:
        - Key: Project
          Value: Veloquity
        - Key: Env
          Value: !Ref Env

  # ------------------------------------------------------------
  # Lambda — Governance Agent (Section 8)
  # Triggered daily by EventBridge.
  # ------------------------------------------------------------
  GovernanceLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub veloquity-governance-${Env}
      Runtime: python3.12
      Handler: governance.governance_lambda.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref DeployBucket
        S3Key: lambda/governance.zip
      Timeout: 300
      MemorySize: 256
      VpcConfig:
        SecurityGroupIds:
          - !Ref SecurityGroupId
        SubnetIds: !Ref SubnetIds
      Environment:
        Variables:
          ENV: !Ref Env
          DB_SECRET_ARN: !Ref DBSecret
          AWS_REGION_NAME: !Ref AWS::Region
          STALE_SIGNAL_DAYS: "30"
          SIGNAL_PROMOTION_FREQ: "10"
          CACHE_HIT_RATE_ALERT: "0.40"
          INGESTION_LAMBDA_ARN: !GetAtt IngestionLambda.Arn
          EVIDENCE_LAMBDA_ARN: !GetAtt EvidenceLambda.Arn
      Tags:
        - Key: Project
          Value: Veloquity
        - Key: Env
          Value: !Ref Env

  GovernanceLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt GovernanceLambda.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt GovernanceDailyRule.Arn

  # ------------------------------------------------------------
  # EventBridge — Daily Governance Cron (Section 8)
  # Runs at 02:00 UTC every day.
  # ------------------------------------------------------------
  GovernanceDailyRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub veloquity-governance-daily-${Env}
      Description: Triggers Veloquity Governance Agent daily at 02:00 UTC
      ScheduleExpression: cron(0 2 * * ? *)
      State: ENABLED
      Targets:
        - Arn: !GetAtt GovernanceLambda.Arn
          Id: GovernanceLambdaTarget

  # ------------------------------------------------------------
  # CloudWatch Log Groups (explicit, with retention)
  # ------------------------------------------------------------
  IngestionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/veloquity-ingestion-${Env}
      RetentionInDays: 30

  EvidenceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/veloquity-evidence-${Env}
      RetentionInDays: 30

  ReasoningLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/veloquity-reasoning-${Env}
      RetentionInDays: 30

  GovernanceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/veloquity-governance-${Env}
      RetentionInDays: 30

# ==============================================================
# OUTPUTS
# ==============================================================
Outputs:
  RawFeedbackBucketName:
    Description: S3 bucket for raw feedback
    Value: !Ref RawFeedbackBucket
    Export:
      Name: !Sub veloquity-raw-bucket-${Env}

  ReportBucketWebsiteURL:
    Description: S3 static website URL for PM reports
    Value: !GetAtt ReportBucket.WebsiteURL
    Export:
      Name: !Sub veloquity-report-url-${Env}

  DBEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt VeloquityDB.Endpoint.Address
    Export:
      Name: !Sub veloquity-db-endpoint-${Env}

  DBSecretArn:
    Description: Secrets Manager ARN for DB credentials
    Value: !Ref DBSecret
    Export:
      Name: !Sub veloquity-db-secret-${Env}

  IngestionLambdaArn:
    Description: Ingestion Lambda ARN
    Value: !GetAtt IngestionLambda.Arn

  EvidenceLambdaArn:
    Description: Evidence Intelligence Lambda ARN
    Value: !GetAtt EvidenceLambda.Arn

  ReasoningLambdaArn:
    Description: Reasoning Agent Lambda ARN
    Value: !GetAtt ReasoningLambda.Arn

  GovernanceLambdaArn:
    Description: Governance Agent Lambda ARN
    Value: !GetAtt GovernanceLambda.Arn
